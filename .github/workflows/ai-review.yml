name: Claude AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    name: Claude code review
    runs-on: ubuntu-latest
    steps:
      - name: Check for Claude credentials
        id: check
        env:
          OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          if [ -n "$OAUTH_TOKEN" ]; then
            echo "mode=oauth" >> "$GITHUB_OUTPUT"
          elif [ -n "$API_KEY" ]; then
            echo "mode=api" >> "$GITHUB_OUTPUT"
          else
            echo "mode=none" >> "$GITHUB_OUTPUT"
            echo "::warning::No Claude credentials found. Add CLAUDE_CODE_OAUTH_TOKEN (recommended, uses your Claude Pro/Max subscription) or ANTHROPIC_API_KEY (uses pay-per-use API) as a repo secret. Run 'claude setup-token' locally to generate the OAuth token."
          fi

      - name: Checkout
        if: steps.check.outputs.mode != 'none'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude review (OAuth / Claude subscription)
        if: steps.check.outputs.mode == 'oauth'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request for the repository ${{ github.repository }}, PR #${{ github.event.pull_request.number }}.

            Focus on:
            - Correctness bugs and logic errors
            - Security vulnerabilities (injection, secrets, auth issues)
            - Performance regressions
            - Obvious bad practices for the language/framework
            - Missing error handling at trust boundaries

            Skip:
            - Style nits already enforced by linters
            - Speculative concerns without evidence

            Post findings as inline review comments on the relevant lines. If the PR looks clean, post a single summary comment confirming that.
          claude_args: '--allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh:*),Read,Grep,Glob"'

      - name: Run Claude review (API key)
        if: steps.check.outputs.mode == 'api'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for the repository ${{ github.repository }}, PR #${{ github.event.pull_request.number }}.

            Focus on:
            - Correctness bugs and logic errors
            - Security vulnerabilities (injection, secrets, auth issues)
            - Performance regressions
            - Obvious bad practices for the language/framework
            - Missing error handling at trust boundaries

            Skip:
            - Style nits already enforced by linters
            - Speculative concerns without evidence

            Post findings as inline review comments on the relevant lines. If the PR looks clean, post a single summary comment confirming that.
          claude_args: '--allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh:*),Read,Grep,Glob"'
